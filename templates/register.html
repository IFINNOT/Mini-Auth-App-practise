{% extends 'base.html' %}
{% block content %}
<h2>註冊帳號</h2>
<form method="POST">
  <input type="text"     name="username" placeholder="帳號" required><br>
  <input type="email"    name="email"    placeholder="Email" required><br>
  <input type="password" name="password" placeholder="密碼（至少 6 碼）" required><br>
  <button type="submit">註冊</button>
</form>
<p>已有帳號？<a href="{{ url_for('login') }}">登入</a></p>
{% endblock %}
